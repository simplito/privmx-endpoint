name: Build Doxygen Docs

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    tags:
      - '*'

jobs:
  doxygen:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/simplito/doxygen-docker:v1.16.1

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set environment variable
        run: echo "PRIVMX_ENDPOINT_VERSION=$(git describe --tags --always --dirty)" >> $GITHUB_ENV

      - name: Generate docs
        run: |
          cd docs
          doxygen Doxyfile

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ env.PRIVMX_ENDPOINT_VERSION }}
          path: docs/html
