name: empty_server_and_mongo

services:
  mongodb:
    image: mongo:7.0
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - ${DOCKER_MONGO_PORT}:27017
    volumes:
      - './volumes/mongo/db:/data/db'
      - './volumes/mongo/configdb:/data/configdb'
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }" | mongosh --port 27017 --quiet
      start_period: 10s
      start_interval: 1s

  teamserver:
    image: privmx-bridge
    env_file:
      - path: ./bridge.env
        required: false
    ports:
      - ${DOCKER_BRIDGE_PORT}:3000
    volumes:
      - './volumes/config:/etc/privmx-bridge'
      - './volumes/bridge/storage:/work/privmx-bridge/storage'
    environment:
      PRIVMX_MONGO_URL: "mongodb://mongodb/"
      PRIVMX_CORS_ENABLED: "true"
      PRIVMX_WORKERS: 2
    depends_on:
      - mongodb
    healthcheck:
      test: pmxbridge_up
      start_period: 20s
      start_interval: 1s

